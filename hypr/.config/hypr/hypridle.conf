# hypridle config
# Monitor sleep after 300 seconds (5 min) of inactivity

general {
    # No lock command — monitor sleep only
}

listener {
    timeout = 300
    on-timeout = hyprctl dispatch 'hl.dsp.dpms({ action = "disable" })'
    on-resume  = hyprctl dispatch 'hl.dsp.dpms({ action = "enable" })'
}
